name: roost_app
description: "Roost — Find verified rentals near you in Nairobi."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  url_launcher: ^6.2.5
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  intl: ^0.20.3
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  shared_preferences: ^2.5.5
  jwt_decoder: ^2.0.1
  video_player: ^2.13.0
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  record: ^7.1.1
  just_audio: ^0.9.36


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/roost_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/roost_icon_foreground.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/icon/roost_icon.png"
  android: true
  ios: false
  android_12:
    image: "assets/icon/roost_icon.png"
    icon_background_color: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/